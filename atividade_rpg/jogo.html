<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- cabeçalho e título -->
            <div class="card-header text-center">Nome do RPG - criado por joab</div>
            <div class="card-body" id="tela" style="background-image: url('assets/backgroundCM.png');">
                <div class="row">
                    <div class="col">
                        <ul class="list-group float-end text-center" style="width: 250px">
                            <li id="nome-hero" class="list-group-item"></li>
                            <li id="titulo-hero" class="list-group-item">herói</li>
                            <li class="list-group-item">❤️
                                <progress id="hp-hero" value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li class="list-group-item">🧪
                                <progress id="mp-hero" value="100" max="100"></progress>
                            </li>
                            <li class="list-group-item">⚡
                                <progress id="en-hero" value="100" max="100"style="accent-color: orange;"></progress>
                            </li>
                            
                        </ul>
                    </div>
                    <div class="col">
                        <ul class="list-group float-start text-center" style="width: 225px">
                            <li id="nome-boss" class="list-group-item"></li>
                            <li id="titulo-boss" class="list-group-item">boss</li>
                            <li class="list-group-item">❤️
                                <progress id="hp-boss" value="100" max="100" style="accent-color: red;"></progress>
                            </li>
                            <li class="list-group-item">🧪
                                <progress value="100" max="100"></progress>
                            </li>
                            <li class="list-group-item">⚡
                                <progress id="en-boss" value="100" max="100"style="accent-color: orange;"></progress>
                            </li>
                            
                        </ul>
                    </div>
                </div>
                <div class="row">
                    <div class="col text-end">
                        <img src="assets/denji.gif"  width="300" height="500"/>
                        <div id="controles"></div>
                    </div>
                    <div class="col">
                        <img src="assets/reze (1) (3) (1).png" width="100"  height="400"/>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <small class="text-muted">ações do heroí</small>
                <p></p>
                <small class="text-mutet">ações do boss</small>
            </div>
        </div>
    </div>
    </div>
</body>
  <script src="javascript.js"></script> ''
</html>
